---
layout: default
---
<article class="section post">
  <div class="wrap wrap--narrow">
    <a class="post__back" href="{{ '/#blog' | relative_url }}">← Back</a>
    <p class="post__date">{{ page.date | date: "%B %-d, %Y" }}{% if page.tags %} · {{ page.tags | join: " · " }}{% endif %}</p>
    <h1 class="post__title">{{ page.title }}</h1>
    <div class="post__body">
      {{ content }}
    </div>
    <a class="post__back post__back--bottom" href="{{ '/#blog' | relative_url }}">← Back to all posts</a>
  </div>
</article>
