# ─────────────────────────────────────────────────────────────
#  Site configuration
#  Most of what you edit day-to-day lives in _data/ (profile,
#  publications, research). Keep this file small.
# ─────────────────────────────────────────────────────────────

title:       "Marcin Kluczek"
description: "Earth Observation scientist — turning satellite signals into ecological insight."
url:         "https://mkluczek.github.io"
baseurl:     ""
lang:        "en"

# Build
markdown:    kramdown
highlighter: rouge
encoding:    "utf-8"
timezone:    Europe/Warsaw

sass:
  style: compressed

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - vendor
  - .github

plugins:
  - jekyll-feed
  - jekyll-sitemap
