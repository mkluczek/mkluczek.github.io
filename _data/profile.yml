# A short intro paragraph for the About section (2–4 sentences).
intro: >
  I lead algorithm development for Earth Observation at CloudFerro —
  designing the GeoAI models and pipelines that turn Sentinel-2,
  hyperspectral and airborne imagery into reliable maps at scale. My
  focus is robust, reproducible machine learning over open satellite
  archives: model design and benchmarking, feature engineering and
  validation — applied to problems from land cover to ecosystem
  monitoring.

