- title: "GeoAI & Machine Learning"
  icon:  "brain"
  blurb: >
    The core of my work: designing and benchmarking ML models —
    Random Forest, SVM and deep neural networks — for Earth
    Observation, with rigorous feature engineering, selection and
    validation.

- title: "Scalable EO Pipelines"
  icon:  "layers"
  blurb: >
    Building reproducible, production-grade pipelines that run models
    over large open satellite archives (Sentinel-2, PlanetScope) —
    turning research prototypes into maps at scale.

- title: "Hyperspectral & Multitemporal Analysis"
  icon:  "spectrum"
  blurb: >
    Extracting signal from airborne HySpex hyperspectral data and
    multitemporal Sentinel-2 to crack hard classification problems in
    complex terrain.

- title: "Applications: Ecosystem Monitoring"
  icon:  "leaf"
  blurb: >
    Putting the models to work on real problems — land cover, forest
    species, wetland health and vegetation stress — where GeoAI meets
    environmental science.
